name: Lint and Test 

on: 
  push: 
    branches: [ "main", "master" ]
  pull_request: 
    branches: [ "main", "master" ]

jobs: 
  build-and-test: 
    runs-on: ubuntu-latest 
    steps: 
    - name: Checkout code 
      uses: actions/checkout@v4

    - name: Set up Go 
      uses: actions/setup-go@v5
      with: 
        go-version: '1.24'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Run Tests
      run: go test -v ./...

    - name: Run golangci-lint 
      uses: golangci/golangci-lint-action@v4 
      with: 
        version: latest
        args: --verbose